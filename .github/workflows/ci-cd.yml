name: Bodaboda Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # TASK 2: CONTINUOUS INTEGRATION (CI)
  ci-testing:
    name: "Task 2: Continuous Integration"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          # Pipeline will fail here if tests fail (Assignment Requirement)
          python app/manage.py test tests/

  # TASK 3: CONTINUOUS DEPLOYMENT (CD) - Part 1: Staging
  build-and-deploy-staging:
    name: "Task 3.1: Staging Deployment"
    needs: ci-testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (With Version Tags - Task 4)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-be:latest
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-be:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/bodaboda/staging
            cd ~/bodaboda/staging
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            # Stop legacy containers to free up port 8005
            docker stop bodakitaa-fe-be-1 2>/dev/null || true
            docker rm bodakitaa-fe-be-1 2>/dev/null || true
            # Deploy new container
            docker compose -f ../docker-compose.backend.yml pull backend
            docker compose -f ../docker-compose.backend.yml up -d --remove-orphans
            # Run migrations
            docker exec bodaboda-be python manage.py migrate --noinput
            echo "STAGING DEPLOYMENT SUCCESSFUL"
            docker ps | grep bodaboda


  # TASK 3: CONTINUOUS DEPLOYMENT (CD) - Part 2: Approval & Production
  deploy-production:
    name: "Task 3.2: Production Deployment"
    needs: build-and-deploy-staging
    runs-on: ubuntu-latest
    environment: production # Approval Gate (Task 3.2)
    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/bodaboda
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            # Ensure legacy containers are gone
            docker stop bodakitaa-fe-be-1 2>/dev/null || true
            docker rm bodakitaa-fe-be-1 2>/dev/null || true
            # Deploy new container
            docker compose -f docker-compose.backend.yml pull backend
            docker compose -f docker-compose.backend.yml up -d
            # Run migrations
            docker exec bodaboda-be python manage.py migrate --noinput
            docker image prune -f
            echo "PRODUCTION DEPLOYMENT SUCCESSFUL"
            
      # TASK 4: DOCKER MANAGEMENT & MONITORING
      - name: Collect Monitoring Logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- APPLICATION LOGS (TASK 4) ---"
            docker logs --tail 20 bodaboda-be
            echo "--- CONTAINER STATUS ---"
            docker stats bodaboda-be --no-stream
