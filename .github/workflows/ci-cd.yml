# This workflow defines the CI/CD pipeline for the Bodaboda Backend application.
# It covers Task 2 (CI), Task 3 (CD), and Task 4 (Monitoring) of the CS 421 assignment.

name: Bodaboda Backend CI/CD Pipeline

on:
  push:
    # Trigger the pipeline automatically when code is pushed to the main or master branches.
    branches: [ "main", "master" ]
  pull_request:
    # Trigger the pipeline when a pull request is created.
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # TASK 2: CONTINUOUS INTEGRATION (CI)
  # ==========================================
  ci-testing:
    name: "Task 2: Continuous Integration"
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download the source code from the repository.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11 environment.
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install all required backend dependencies (Django, Graphene, etc.)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Execute Unit Tests to ensure code quality.
      # The pipeline will fail automatically if any test fails (Assignment Requirement).
      - name: Run Unit Tests
        run: |
          python app/manage.py test tests/

  # ==========================================
  # TASK 3: CONTINUOUS DEPLOYMENT (CD) - Staging
  # ==========================================
  build-and-deploy-staging:
    name: "Task 3.1: Staging Deployment"
    needs: ci-testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Login to Docker Hub using secrets for security.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 2: Setup Docker Buildx for optimized image building.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build the Docker image and push it to the registry.
      # We use multiple tags (:latest and :v1) as required by Task 4.
      - name: Build and push (Task 4: Image Tagging)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-be:latest
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-be:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 4: Connect to the server via SSH and deploy the containers.
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/bodaboda/staging
            cd ~/bodaboda/staging
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            # Cleanup old legacy containers to avoid port conflicts.
            docker stop bodakitaa-fe-be-1 2>/dev/null || true
            docker rm bodakitaa-fe-be-1 2>/dev/null || true
            # Pull the latest image and start the backend and database.
            docker compose -p bodaboda-be -f ../docker-compose.backend.yml pull backend
            docker compose -p bodaboda-be -f ../docker-compose.backend.yml up -d --remove-orphans
            # Run database migrations to ensure the schema is up-to-date.
            docker exec bodaboda-be python manage.py migrate --noinput
            echo "STAGING DEPLOYMENT SUCCESSFUL"
            docker ps | grep bodaboda

  # ==========================================
  # TASK 3: CONTINUOUS DEPLOYMENT (CD) - Production
  # ==========================================
  deploy-production:
    name: "Task 3.2: Production Deployment"
    needs: build-and-deploy-staging
    runs-on: ubuntu-latest
    # This environment "production" triggers the Manual Approval Gate (Task 3.2).
    environment: production 
    steps:
      # Step 1: Deploy to the live production environment.
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/bodaboda
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            # Stop legacy containers if they still exist.
            docker stop bodakitaa-fe-be-1 2>/dev/null || true
            docker rm bodakitaa-fe-be-1 2>/dev/null || true
            # Deploy the live system.
            docker compose -p bodaboda-be -f docker-compose.backend.yml pull backend
            docker compose -p bodaboda-be -f docker-compose.backend.yml up -d
            # Run production database migrations.
            docker exec bodaboda-be python manage.py migrate --noinput
            docker image prune -f
            echo "PRODUCTION DEPLOYMENT SUCCESSFUL"
            
      # ==========================================
      # TASK 4: DOCKER MANAGEMENT & MONITORING
      # ==========================================
      # Step 2: Fetch and display logs to demonstrate monitoring.
      - name: Collect Monitoring Logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- APPLICATION LOGS (TASK 4: MONITORING) ---"
            docker logs --tail 20 bodaboda-be
            echo "--- CONTAINER RESOURCE USAGE ---"
            docker stats bodaboda-be --no-stream
